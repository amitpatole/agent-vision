<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard (fixed)</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #ffffff; }
    h1 { color: #111; }
    /* Dark text on white -> passes WCAG AA. */
    p.note { color: #333333; background: #ffffff; font-size: 15px; }
    /* Responsive grid that never exceeds the viewport. */
    .row { display: flex; flex-wrap: wrap; gap: 16px; }
    .card { flex: 1 1 200px; min-width: 0; height: 80px; background: #f4f4f4; }
    .cta { color: #0b5cad; background: #ffffff; font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Quarterly Dashboard</h1>
  <p class="note">Revenue is up 12% over last quarter. This summary text is easy to read.</p>

  <!-- Inline SVG data-URI logo: always loads, no broken image. -->
  <img alt="Company logo" width="160" height="48"
       src="data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' width='160' height='48'&gt;&lt;rect width='160' height='48' fill='%230b5cad'/&gt;&lt;text x='12' y='30' fill='white' font-family='sans-serif' font-size='18'&gt;ACME&lt;/text&gt;&lt;/svg&gt;">

  <div class="row">
    <span class="card">Metric A</span>
    <span class="card">Metric B</span>
    <span class="card">Metric C</span>
  </div>

  <p class="cta">Click here to view the full report</p>
</body>
</html>
