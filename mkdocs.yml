site_name: AgentVision
site_description: >-
  Eyes for AI Agents — a machine-graded visual feedback loop coding agents consume to
  self-correct before claiming done.
site_url: https://amitpatole.github.io/agent-vision/
repo_url: https://github.com/amitpatole/agent-vision
repo_name: amitpatole/agent-vision
copyright: MIT © Amit Patole
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
  font:
    text: Inter
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            heading_level: 3
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            filters: ["!^_"]

nav:
  - Home: index.md
  - Get started:
      - Quickstart: quickstart.md
      - The loop: the-loop.md
  - Guides:
      - Conformance (match intent): conformance.md
      - Streaming / temporal: use-cases/streaming.md
      - Eyes → brain (handoff): handoff.md
      - Vision backends: backends.md
  - Use it:
      - Adapters (CLI/MCP/REST/Skill): adapters.md
      - Workflows & agents: integrations.md
      - Recipes: recipes.md
  - Reference:
      - CLI: cli.md
      - Configuration: configuration.md
      - Python API: api.md
  - Help:
      - FAQ & troubleshooting: faq.md
  - About:
      - Design (VISION): VISION.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/amitpatole/agent-vision
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentvision/
